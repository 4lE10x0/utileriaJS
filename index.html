<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Utileria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .emergent-label {
            display: none;
            color: red;
            font-size: 0.9em;
            margin-top: 5px;
        }

        input:focus+.emergent-label {
            display: block;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Formulario de Prueba</h2>
        <formid="formUtileria" class="needs-validation" novalidate>

            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre (Solo letras)</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ingrese su nombre"
                    onblur="if(soloLetras(this.value)){document.getElementById('nombre-label').style.display = 'none';}else{document.getElementById('nombre-label').style.display = 'inline';}">
                <span class="emergent-label" id="nombre-label"> ingresa solo letras</span>
            </div>

            <div class="mb-3">
                <label for="numero" class="form-label">Numero (Validar longitud)</label>
                <input type="text" id="numero" class="form-control" placeholder="Ingrese un numero con maximo 10 digitos"
                onblur="if(validarLongitud(this.value, 10)){document.getElementById('numero-label').style.display = 'none';}else{document.getElementById('numero-label').style.display = 'inline';}">
                <span class="emergent-label" id="numero-label"> ingresa solo numeros!</span>
            </div>

            <div class="mb-3">
                <label for="fechaNacimiento" class="form-label">Fecha de nacimiento</label>
                <input type="date" class="form-control" id="fechaNacimiento">
            </div>

            <div class="mb-3">
                <label for="url" class="form-label">Página web (URL)</label>
                <input type="url" class="form-control" id="url" placeholder="https://ejemplo.com"
                    oninput="if(validarURL(this.value)){document.getElementById('url-label').style.display = 'none';}else{document.getElementById('url-label').style.display = 'inline';}">
                <span class="emergent-label" id="url-label"> ingresa solo enlaces!</span>
            </div>

            <div class="mb-3">
                <label for="telefono" class="form-label">Teléfono</label>
                <input type="text" class="form-control" id="telefono" placeholder="+52 9511234567"
                    oninput="if(validarTelefono(this.value)){document.getElementById('telefono-label').style.display = 'none';}else{document.getElementById('telefono-label').style.display = 'inline';}">
                <span class="emergent-label" id="telefono-label"> ingresa un telefono!</span>
            </div>

            <button type="button" class="btn btn-primary" onclick="validarDate()">Validar</button>
            </form>

            <div class="mt-3">
                <a href="login.html" class="link-primary">Ir al Log In</a>
            </div>
    </div>
</body>
<script src="js/utileria.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
